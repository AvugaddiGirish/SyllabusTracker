<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syllabus Tracker — Master Your Studies</title>
    <meta name="description" content="A beautiful, full-featured study syllabus tracker with subjects, tags, priorities, study timer, analytics, and dark mode.">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

    <!-- ═══════════════════════════════════════ -->
    <!-- AUTH OVERLAY -->
    <!-- ═══════════════════════════════════════ -->
    <div class="auth-overlay" id="auth-overlay">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="auth-logo">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2">
                        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#6366f1"/><stop offset="100%" style="stop-color:#0ea5e9"/></linearGradient></defs>
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                    </svg>
                </div>
                <h1>Syllabus Tracker</h1>
                <p>Master your topics, one step at a time.</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login" id="tab-login">Sign In</button>
                <button class="auth-tab" data-tab="register" id="tab-register">Create Account</button>
            </div>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="auth-submit-btn" id="login-submit-btn">Sign In</button>
                <p class="auth-error" id="login-error"></p>
            </form>

            <form id="register-form" class="auth-form hidden">
                <div class="form-group">
                    <label for="register-username">Username</label>
                    <input type="text" id="register-username" placeholder="studious_scholar" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="register-password">Password</label>
                    <input type="password" id="register-password" placeholder="Min 6 characters" required autocomplete="new-password">
                </div>
                <button type="submit" class="auth-submit-btn" id="register-submit-btn">Create Account</button>
                <p class="auth-error" id="register-error"></p>
            </form>
        </div>
    </div>

    <!-- ═══════════════════════════════════════ -->
    <!-- MAIN APP SHELL -->
    <!-- ═══════════════════════════════════════ -->
    <div class="app-shell hidden" id="app-shell">

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--primary-color)" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                    <span class="brand-name">Syllabus Tracker</span>
                </div>
                <button class="sidebar-close-btn" id="sidebar-close-btn" aria-label="Close sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <!-- User info -->
            <div class="sidebar-user" id="sidebar-user">
                <div class="user-avatar" id="user-avatar">U</div>
                <div class="user-info">
                    <span class="user-name" id="user-name">User</span>
                    <button class="logout-link" id="logout-btn">Sign Out</button>
                </div>
            </div>

            <nav class="sidebar-nav">
                <!-- Subjects Section -->
                <div class="nav-section">
                    <div class="nav-section-header">
                        <span>Subjects</span>
                        <button class="nav-add-btn" id="add-subject-btn" aria-label="Add subject" title="Add subject">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </button>
                    </div>
                    <ul class="nav-list" id="subjects-list">
                        <li class="nav-item active" data-subject="all">
                            <span class="nav-dot" style="background:#6366f1"></span>
                            <span class="nav-label">All Topics</span>
                            <span class="nav-count" id="all-count">0</span>
                        </li>
                        <!-- Dynamic subjects inserted here -->
                    </ul>
                </div>

                <!-- Tags Section -->
                <div class="nav-section">
                    <div class="nav-section-header">
                        <span>Tags</span>
                        <button class="nav-add-btn" id="add-tag-btn" aria-label="Add tag" title="Add tag">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </button>
                    </div>
                    <ul class="nav-list" id="tags-list">
                        <!-- Dynamic tags inserted here -->
                    </ul>
                </div>
            </nav>

            <div class="sidebar-footer">
                <button class="sidebar-action-btn" id="dark-mode-toggle">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="theme-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    <span id="theme-label">Dark Mode</span>
                </button>
                <button class="sidebar-action-btn" id="export-csv-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    <span>Export CSV</span>
                </button>
            </div>
        </aside>

        <!-- MOBILE HEADER -->
        <header class="mobile-header" id="mobile-header">
            <button class="hamburger-btn" id="hamburger-btn" aria-label="Open menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <span class="mobile-title">Syllabus Tracker</span>
            <button class="mobile-timer-btn" id="mobile-timer-btn" aria-label="Study timer">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </button>
        </header>

        <!-- MAIN CONTENT -->
        <main class="main-content" id="main-content">

            <!-- Dashboard / Analytics -->
            <section class="dashboard" id="dashboard-section">
                <div class="dash-card dash-progress">
                    <div class="dash-donut-wrap">
                        <svg class="dash-donut" viewBox="0 0 36 36">
                            <circle class="donut-bg" cx="18" cy="18" r="15.9" fill="none" stroke-width="3"/>
                            <circle class="donut-mastered" id="donut-mastered" cx="18" cy="18" r="15.9" fill="none" stroke-width="3" stroke-dasharray="0 100" stroke-dashoffset="25"/>
                            <circle class="donut-progress" id="donut-progress" cx="18" cy="18" r="15.9" fill="none" stroke-width="3" stroke-dasharray="0 100" stroke-dashoffset="25"/>
                        </svg>
                        <div class="donut-center">
                            <span class="donut-percent" id="donut-percent">0%</span>
                            <span class="donut-label">Mastered</span>
                        </div>
                    </div>
                    <div class="dash-stats">
                        <div class="stat-pill stat-total"><span class="stat-num" id="stat-total">0</span><span class="stat-lbl">Total</span></div>
                        <div class="stat-pill stat-not-started"><span class="stat-num" id="stat-not-started">0</span><span class="stat-lbl">Not Started</span></div>
                        <div class="stat-pill stat-in-progress"><span class="stat-num" id="stat-in-progress">0</span><span class="stat-lbl">In Progress</span></div>
                        <div class="stat-pill stat-mastered"><span class="stat-num" id="stat-mastered">0</span><span class="stat-lbl">Mastered</span></div>
                    </div>
                </div>
                <div class="dash-card dash-streak">
                    <div class="streak-flame" id="streak-flame">🔥</div>
                    <div class="streak-info">
                        <span class="streak-num" id="streak-current">0</span>
                        <span class="streak-lbl">Day Streak</span>
                    </div>
                    <div class="streak-best">Best: <span id="streak-longest">0</span></div>
                </div>
                <div class="dash-card dash-timer" id="dash-timer-card">
                    <div class="timer-display">
                        <svg class="timer-ring" viewBox="0 0 120 120">
                            <circle class="timer-ring-bg" cx="60" cy="60" r="52" fill="none" stroke-width="6"/>
                            <circle class="timer-ring-fg" id="timer-ring-fg" cx="60" cy="60" r="52" fill="none" stroke-width="6" stroke-dasharray="326.73" stroke-dashoffset="0"/>
                        </svg>
                        <div class="timer-text" id="timer-text">25:00</div>
                    </div>
                    <div class="timer-controls">
                        <select class="timer-topic-select" id="timer-topic-select">
                            <option value="">No topic linked</option>
                        </select>
                        <div class="timer-btns">
                            <button class="timer-btn timer-start" id="timer-start-btn">Start</button>
                            <button class="timer-btn timer-reset" id="timer-reset-btn">Reset</button>
                        </div>
                    </div>
                    <div class="timer-total-wrap">
                        <span class="timer-total-label">Total study time:</span>
                        <span class="timer-total-value" id="timer-total-value">0h 0m</span>
                    </div>
                </div>
            </section>

            <!-- Search & Filter Bar -->
            <section class="filter-bar" id="filter-bar">
                <div class="search-wrap">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" class="search-input" id="search-input" placeholder="Search topics..." autocomplete="off">
                </div>
                <div class="filter-dropdowns">
                    <select class="filter-select" id="filter-status">
                        <option value="">All Status</option>
                        <option value="Not Started">Not Started</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Mastered">Mastered</option>
                    </select>
                    <select class="filter-select" id="filter-priority">
                        <option value="">All Priority</option>
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                    </select>
                    <select class="filter-select" id="filter-tag">
                        <option value="">All Tags</option>
                    </select>
                </div>
            </section>

            <!-- Add Topic Form (expanded) -->
            <section class="add-topic-section" id="add-topic-section">
                <button class="add-toggle-btn" id="add-toggle-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span>Add New Topic</span>
                </button>
                <form id="add-topic-form" class="add-topic-form hidden">
                    <div class="form-row">
                        <input type="text" id="topic-title-input" placeholder="Topic title..." required autocomplete="off" class="form-input-main">
                    </div>
                    <div class="form-row form-row-details">
                        <select id="topic-subject-select" class="form-select">
                            <option value="">No Subject</option>
                        </select>
                        <select id="topic-priority-select" class="form-select">
                            <option value="Medium">Medium Priority</option>
                            <option value="High">High Priority</option>
                            <option value="Low">Low Priority</option>
                        </select>
                        <input type="date" id="topic-deadline-input" class="form-input-date" title="Deadline">
                    </div>
                    <div class="form-row">
                        <textarea id="topic-desc-input" placeholder="Notes or description (optional)..." rows="2" class="form-textarea"></textarea>
                    </div>
                    <div class="form-row form-row-tags">
                        <div class="tag-chips-select" id="tag-chips-select">
                            <!-- Tag chips populated dynamically -->
                        </div>
                    </div>
                    <div class="form-row form-actions">
                        <button type="button" class="cancel-btn" id="add-cancel-btn">Cancel</button>
                        <button type="submit" class="primary-btn" id="add-submit-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            Add Topic
                        </button>
                    </div>
                </form>
            </section>

            <!-- Topics List -->
            <section class="topics-board" id="topics-board">
                <div class="topics-grid" id="topics-grid">
                    <!-- Dynamic topic cards -->
                </div>
            </section>
        </main>
    </div>

    <!-- ═══════════════════════════════════════ -->
    <!-- MODALS -->
    <!-- ═══════════════════════════════════════ -->

    <!-- Create Subject Modal -->
    <div class="modal-overlay hidden" id="subject-modal">
        <div class="modal-card">
            <h3>New Subject</h3>
            <form id="subject-form">
                <div class="form-group">
                    <label for="subject-name-input">Name</label>
                    <input type="text" id="subject-name-input" placeholder="e.g. Mathematics" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="subject-color-input">Color</label>
                    <input type="color" id="subject-color-input" value="#6366f1" class="color-picker">
                </div>
                <div class="modal-actions">
                    <button type="button" class="cancel-btn modal-cancel" data-modal="subject-modal">Cancel</button>
                    <button type="submit" class="primary-btn">Create Subject</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Create Tag Modal -->
    <div class="modal-overlay hidden" id="tag-modal">
        <div class="modal-card">
            <h3>New Tag</h3>
            <form id="tag-form">
                <div class="form-group">
                    <label for="tag-name-input">Name</label>
                    <input type="text" id="tag-name-input" placeholder="e.g. Urgent" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="tag-color-input">Color</label>
                    <input type="color" id="tag-color-input" value="#f43f5e" class="color-picker">
                </div>
                <div class="modal-actions">
                    <button type="button" class="cancel-btn modal-cancel" data-modal="tag-modal">Cancel</button>
                    <button type="submit" class="primary-btn">Create Tag</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Topic Modal -->
    <div class="modal-overlay hidden" id="edit-topic-modal">
        <div class="modal-card modal-card-lg">
            <h3>Edit Topic</h3>
            <form id="edit-topic-form">
                <input type="hidden" id="edit-topic-id">
                <div class="form-group">
                    <label for="edit-topic-title">Title</label>
                    <input type="text" id="edit-topic-title" required autocomplete="off">
                </div>
                <div class="form-row form-row-details">
                    <div class="form-group">
                        <label for="edit-topic-subject">Subject</label>
                        <select id="edit-topic-subject" class="form-select"></select>
                    </div>
                    <div class="form-group">
                        <label for="edit-topic-priority">Priority</label>
                        <select id="edit-topic-priority" class="form-select">
                            <option value="High">High</option>
                            <option value="Medium">Medium</option>
                            <option value="Low">Low</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edit-topic-deadline">Deadline</label>
                        <input type="date" id="edit-topic-deadline" class="form-input-date">
                    </div>
                </div>
                <div class="form-group">
                    <label for="edit-topic-desc">Notes</label>
                    <textarea id="edit-topic-desc" rows="3" class="form-textarea"></textarea>
                </div>
                <div class="form-group">
                    <label>Tags</label>
                    <div class="tag-chips-select" id="edit-tag-chips-select"></div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="cancel-btn modal-cancel" data-modal="edit-topic-modal">Cancel</button>
                    <button type="submit" class="primary-btn">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay hidden" id="sidebar-overlay"></div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
